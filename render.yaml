services:
  - type: web
    name: edocr
    runtime: docker
    envVars:
      - key: MONGODB_URI
        sync: false          # set this to your MongoDB connection string in the Render Dashboard
      - key: MONGODB_DB
        value: glypad_db
      - key: ALLOWED_ORIGINS
        sync: false          # set to https://your-app.onrender.com after first deploy
    autoDeploy: true
